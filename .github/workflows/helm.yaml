name: helm

on:
  push:
    branches: [main]
    paths:
      - 'charts/*/Chart.yaml'
      - '.github/workflows/helm.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  CHARTS_REPO: ghcr.io/${{ github.repository_owner }}/charts

permissions:
  contents: read
  packages: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: login to ghcr
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login \
            ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: package and push
        run: |
          mkdir -p out
          for chart in charts/*/; do
            helm package "$chart" -d out
          done
          for pkg in out/*.tgz; do
            helm push "$pkg" "oci://${{ env.CHARTS_REPO }}"
          done
