apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}
      containers:
        - name: operator
          image: "{{ .Values.image.repository }}:{{ required "image.tag is required" .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: OPERATOR_LEASE_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: OPERATOR_LEASE_NAME
              value: {{ .Values.leader.name | quote }}
            - name: OPERATOR_HOLDER_ID
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: OPERATOR_LEASE_DURATION_SECONDS
              value: {{ .Values.leader.leaseDurationSeconds | quote }}
            - name: OPERATOR_LEASE_GRACE_SECONDS
              value: {{ .Values.leader.leaseGraceSeconds | quote }}
            - name: OPERATOR_HEALTH_PORT
              value: {{ .Values.healthPort | quote }}
            - name: OPERATOR_TRAEFIK_IMAGE
              value: {{ .Values.traefikImage | quote }}
            - name: OPERATOR_RECONCILE_INTERVAL_SECONDS
              value: {{ .Values.reconcileIntervalSeconds | quote }}
            - name: OPERATOR_ERROR_BACKOFF_SECONDS
              value: {{ .Values.errorBackoffSeconds | quote }}
            - name: OPERATOR_WAIT_SECONDS
              value: {{ .Values.waitSeconds | quote }}
            - name: RUST_LOG
              value: info
          ports:
            - name: health
              containerPort: {{ .Values.healthPort }}
          livenessProbe:
            httpGet: { path: /healthz, port: health }
          readinessProbe:
            httpGet: { path: /readyz, port: health }
          resources: {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
