apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ingressgroups.ech.bz
spec:
  group: ech.bz
  scope: Namespaced
  names:
    plural: ingressgroups
    singular: ingressgroup
    kind: IngressGroup
    shortNames:
      - igroup
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              properties:
                domains:
                  type: array
                  description: Hostnames owned by this group.
                  items:
                    type: string
                routes:
                  type: array
                  description: Path routes owned by this group.
                  items:
                    type: object
                    required: [pathPrefix, serviceName, servicePort]
                    properties:
                      pathPrefix:
                        type: string
                        description: Traefik PathPrefix match.
                      serviceName:
                        type: string
                      serviceNamespace:
                        type: string
                        description: Backend service namespace. Defaults to the IngressGroup namespace when omitted.
                      servicePort:
                        type: integer
                        minimum: 1
                        maximum: 65535
